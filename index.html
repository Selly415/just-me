<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JUSTME</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#FAF7F2;
  --warm:#F3EDE3;
  --sand:#E8DDD0;
  --taupe:#C4B5A5;
  --brown:#8B6F5E;
  --espresso:#3D2B1F;
  --sage:#8FA68E;
  --blush:#D4A5A5;
  --rose:#C17B7B;
  --ink:#1C1915;
}

html{scroll-behavior:smooth}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
}

/* grain */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:.45;
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  background:rgba(250,247,242,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--sand);
  padding:0 clamp(1.2rem,4vw,3rem);
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.4rem,3vw,1.9rem);font-weight:300;
  letter-spacing:.25em;color:var(--espresso);text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;
}
.logo em{font-style:italic;color:var(--brown)}

.tabs{
  display:flex;gap:2px;background:var(--sand);
  border-radius:30px;padding:3px;flex-shrink:0;
}
.tab{
  padding:7px 20px;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  border:none;background:transparent;color:var(--brown);
  border-radius:30px;cursor:pointer;transition:all .22s;
}
.tab.on{background:var(--espresso);color:var(--cream)}
.tab:hover:not(.on){background:var(--warm);color:var(--espresso)}

.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.admin-link{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--taupe);background:none;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;padding:5px 0;
  border-bottom:1px solid transparent;transition:all .2s;
}
.admin-link:hover{color:var(--brown);border-bottom-color:var(--taupe)}
.admin-badge{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--brown);background:var(--warm);
  border:1px solid var(--sand);border-radius:20px;padding:4px 10px;
}
.logout-btn{
  font-size:11px;color:var(--rose);background:none;
  border:1px solid rgba(193,123,123,.3);border-radius:20px;
  padding:5px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:all .2s;
}
.logout-btn:hover{background:rgba(193,123,123,.08)}

/* ── PAGE TRANSITIONS ── */
.page{display:none;animation:fadeUp .38s ease both}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME ── */
#page-home{
  width:100%;
  max-width:1400px;
  margin:0 auto;
  padding:clamp(1.5rem,3vw,2.5rem) clamp(1rem,3vw,2.5rem);
}

/* ADD FORM */
.add-section{
  background:#fff;border:1px solid var(--sand);
  border-radius:18px;padding:1.6rem 1.8rem;
  margin-bottom:2rem;position:relative;overflow:hidden;
}
.add-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--sage),var(--blush),var(--taupe));
}
.add-section > label{
  display:block;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--taupe);margin-bottom:.9rem;
}
.add-inputs{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch}
.add-inputs input{
  flex:1 1 160px;height:42px;
  background:var(--cream);border:1px solid var(--sand);
  border-radius:10px;padding:0 13px;
  font-size:13.5px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);
  transition:border-color .2s,background .2s;
}
.add-inputs input::placeholder{color:var(--taupe)}
.add-inputs input:focus{outline:none;border-color:var(--brown);background:#fff;box-shadow:0 0 0 3px rgba(139,111,94,.07)}
.add-btn{
  flex:0 0 auto;height:42px;padding:0 22px;
  background:var(--espresso);color:var(--cream);
  border:none;border-radius:10px;
  font-size:13px;font-weight:500;letter-spacing:.05em;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap;
}
.add-btn:hover{background:var(--brown);transform:translateY(-1px)}
.add-btn:active{transform:translateY(0)}

/* ── GRID — responsive columns ── */
.grid{
  display:grid;
  gap:1.2rem;
  /* mobile: 1col, tablet: 2col, desktop: 3–4col */
  grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));
}
@media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ── CARD ── */
.card{
  background:#fff;border:1px solid var(--sand);border-radius:18px;
  overflow:hidden;transition:transform .22s,box-shadow .22s;
  animation:fadeUp .32s ease both;position:relative;
  display:flex;flex-direction:column;
}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(61,43,31,.09)}

.card-body{padding:1.2rem 1.3rem;display:flex;align-items:center;gap:13px;flex:1}

.avatar-wrap{flex-shrink:0}
.avatar-img{
  width:58px;height:58px;border-radius:50%;
  object-fit:cover;border:2px solid var(--sand);display:block;
}
.avatar-initial{
  width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--warm),var(--sand));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:400;color:var(--brown);border:2px solid var(--sand);
}
.card-info{flex:1;min-width:0}
.card-name{
  font-family:'Noto Serif KR',serif;font-size:15.5px;font-weight:400;
  color:var(--ink);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-link{
  font-size:11px;color:var(--sage);text-decoration:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;
  transition:color .18s;
}
.card-link:hover{color:var(--brown)}

/* actions bar */
.card-actions{display:flex;border-top:1px solid var(--warm)}
.heart-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 0;border:none;background:none;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--taupe);
  border-right:1px solid var(--warm);
  transition:background .18s,color .18s;
  font-family:'Noto Sans KR',sans-serif;
}
.heart-btn:hover{background:rgba(212,165,165,.08);color:var(--rose)}
.heart-btn.on{color:var(--rose)}
.h-icon{font-size:14px;display:inline-block;transition:transform .18s}
.heart-btn.on .h-icon{transform:scale(1.2)}

.cmt-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 0;border:none;background:none;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--taupe);
  transition:background .18s,color .18s;
  font-family:'Noto Sans KR',sans-serif;
}
.cmt-btn:hover{background:rgba(143,166,142,.08);color:var(--sage)}
.cmt-btn.on{color:var(--sage)}

/* delete */
.del-btn{
  display:none;position:absolute;top:9px;right:9px;
  background:rgba(255,255,255,.92);border:1px solid rgba(193,123,123,.35);
  color:var(--rose);border-radius:7px;padding:3px 9px;
  font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  backdrop-filter:blur(4px);transition:all .18s;
}
.del-btn:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.card.admin .del-btn{display:block}

/* ── COMMENT SECTION ── */
.cmt-section{
  display:none;border-top:1px solid var(--warm);
  padding:12px 14px;background:var(--cream);
}
.cmt-section.on{display:block;animation:fadeUp .18s ease both}

.cmt-list{
  max-height:150px;overflow-y:auto;
  margin-bottom:10px;
}
.cmt-list::-webkit-scrollbar{width:3px}
.cmt-list::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px}

.cmt-item{
  display:flex;gap:7px;align-items:baseline;margin-bottom:7px;
}
.cmt-author{
  font-family:'Noto Serif KR',serif;
  font-size:11.5px;color:var(--brown);flex-shrink:0;
}
.cmt-text{font-size:13px;color:var(--ink);line-height:1.5;word-break:break-all}
.cmt-none{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13.5px;color:var(--taupe);text-align:center;padding:8px 0;
}

/* comment input row — key fix: no flex wrap, button never cut */
.cmt-row{
  display:flex;gap:6px;align-items:center;
  width:100%;
}
.cmt-in{
  flex:1 1 0;min-width:0;height:36px;
  border:1px solid var(--sand);border-radius:8px;
  padding:0 11px;font-size:13px;
  background:#fff;color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
  transition:border-color .18s;
}
.cmt-in:focus{outline:none;border-color:var(--brown);box-shadow:0 0 0 2px rgba(139,111,94,.06)}
.cmt-send{
  flex:0 0 auto;
  height:36px;padding:0 14px;
  background:var(--espresso);color:var(--cream);
  border:none;border-radius:8px;
  font-size:12.5px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  transition:background .18s;
  white-space:nowrap;
}
.cmt-send:hover{background:var(--brown)}

/* ── RANKING ── */
#page-rank{
  width:100%;max-width:760px;
  margin:0 auto;
  padding:clamp(2rem,4vw,3.5rem) clamp(1rem,3vw,2rem);
}
.rank-hero{text-align:center;margin-bottom:2rem}
.rank-hero h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,5vw,2.8rem);font-weight:300;
  color:var(--espresso);letter-spacing:.06em;margin-bottom:5px;
}
.rank-hero p{font-size:13px;color:var(--taupe);letter-spacing:.06em}
.deco{
  text-align:center;color:var(--sand);
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;letter-spacing:.4em;margin-bottom:1.5rem;
}
.rank-list{display:flex;flex-direction:column;gap:10px}
.rank-item{
  background:#fff;border:1px solid var(--sand);border-radius:14px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  transition:transform .2s,box-shadow .2s;
  animation:fadeUp .3s ease both;
}
.rank-item:hover{transform:translateX(5px);box-shadow:0 6px 24px rgba(61,43,31,.07)}
.rank-no{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:300;
  min-width:38px;text-align:center;color:var(--sand);
}
.rank-item:nth-child(1) .rank-no{color:var(--brown);font-weight:600}
.rank-item:nth-child(2) .rank-no{color:var(--taupe)}
.rank-item:nth-child(3) .rank-no{color:#B59A6B}
.rank-av{
  width:48px;height:48px;border-radius:50%;
  object-fit:cover;border:2px solid var(--sand);flex-shrink:0;
}
.rank-av-in{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--warm),var(--sand));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--brown);
  flex-shrink:0;
}
.rank-info{flex:1;min-width:0}
.rank-name{
  font-family:'Noto Serif KR',serif;font-size:14.5px;color:var(--ink);
  margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.rank-bar-bg{height:3px;background:var(--warm);border-radius:2px}
.rank-bar-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--blush));border-radius:2px;transition:width .6s ease}
.rank-hearts{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:500;color:var(--rose);white-space:nowrap;
}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(28,25,21,.42);backdrop-filter:blur(5px);
  z-index:999;align-items:center;justify-content:center;padding:1rem;
}
.overlay.on{display:flex}
.modal{
  background:var(--cream);border:1px solid var(--sand);
  border-radius:20px;padding:2rem 1.8rem;
  width:100%;max-width:320px;
  animation:fadeUp .22s ease both;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:300;
  color:var(--espresso);margin-bottom:.2rem;letter-spacing:.04em;
}
.modal-sub{font-size:11.5px;color:var(--taupe);margin-bottom:1.4rem;letter-spacing:.04em}
.modal > label{
  display:block;font-size:10.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--taupe);
  margin-bottom:5px;margin-top:13px;
}
.modal input{
  width:100%;height:40px;background:#fff;border:1px solid var(--sand);
  border-radius:9px;padding:0 13px;font-size:14px;
  font-family:'Noto Sans KR',sans-serif;color:var(--ink);transition:border-color .18s;
}
.modal input:focus{outline:none;border-color:var(--brown);box-shadow:0 0 0 3px rgba(139,111,94,.07)}
.modal-err{font-size:12px;color:var(--rose);margin-top:9px;text-align:center;min-height:18px}
.modal-btns{display:flex;gap:8px;margin-top:1.3rem}
.btn-cancel{
  flex:1;height:40px;background:none;border:1px solid var(--sand);
  border-radius:9px;font-size:13px;color:var(--brown);cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:background .18s;
}
.btn-cancel:hover{background:var(--warm)}
.btn-login{
  flex:1;height:40px;background:var(--espresso);border:none;
  border-radius:9px;font-size:13px;color:var(--cream);cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;transition:background .18s;
}
.btn-login:hover{background:var(--brown)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:3.5rem 2rem;grid-column:1/-1}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:.5}
.empty p{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--taupe);font-style:italic}
.empty small{font-size:12px;color:var(--taupe);margin-top:5px;display:block}
.loading-msg{text-align:center;padding:3rem;color:var(--taupe);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.1rem}
</style>
</head>
<body>

<nav>
  <div class="logo">JUST<em>ME</em></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('home',this)">홈</button>
    <button class="tab" onclick="goTab('rank',this)">랭킹</button>
  </div>
  <div class="nav-right" id="nav-right">
    <button class="admin-link" onclick="openModal()">관리자</button>
  </div>
</nav>

<!-- HOME -->
<div class="page on" id="page-home">
  <div class="add-section">
    <label>새 인물 등록</label>
    <div class="add-inputs">
      <input id="i-name" type="text" placeholder="이름"/>
      <input id="i-photo" type="url" placeholder="프로필 사진 URL (선택)"/>
      <input id="i-link" type="url" placeholder="링크 (인스타, 유튜브 등)"/>
      <button class="add-btn" onclick="addPerson()">등록하기</button>
    </div>
  </div>
  <div class="grid" id="grid">
    <div class="loading-msg">불러오는 중 ···</div>
  </div>
</div>

<!-- RANKING -->
<div class="page" id="page-rank">
  <div class="rank-hero">
    <h2>Heart Ranking</h2>
    <p>가장 많은 마음을 받은 사람들</p>
  </div>
  <div class="deco">· · ·</div>
  <div class="rank-list" id="rank-list">
    <div class="loading-msg">불러오는 중 ···</div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">관리자</div>
    <div class="modal-sub">authorized access only</div>
    <label>아이디</label>
    <input type="text" id="m-id" autocomplete="off"/>
    <label>비밀번호</label>
    <input type="password" id="m-pw" onkeydown="if(event.key==='Enter')tryLogin()"/>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-login" onclick="tryLogin()">로그인</button>
    </div>
  </div>
</div>

<script>
const SURL='https://kujdnhthofoonyjflxeq.supabase.co';
const SKEY='sb_publishable_wMEGh4pXPGEo7SV2RKhY3A_5lKq0PXz';
const sb=supabase.createClient(SURL,SKEY);

let persons=[];
let commentsCache={};
let liked=new Set(JSON.parse(localStorage.getItem('jm_liked')||'[]'));
let isAdmin=false;
let openCmt=null;

/* ── TABS ── */
function goTab(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  el.classList.add('on');
  if(id==='rank') renderRank();
}

/* ── MODAL ── */
function openModal(){
  document.getElementById('overlay').classList.add('on');
  document.getElementById('m-id').value='';
  document.getElementById('m-pw').value='';
  document.getElementById('m-err').textContent='';
  setTimeout(()=>document.getElementById('m-id').focus(),100);
}
function closeModal(){document.getElementById('overlay').classList.remove('on')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function tryLogin(){
  const id=document.getElementById('m-id').value;
  const pw=document.getElementById('m-pw').value;
  if(id==='123'&&pw==='com'){
    isAdmin=true;closeModal();
    document.getElementById('nav-right').innerHTML=
      `<span class="admin-badge">관리자</span><button class="logout-btn" onclick="doLogout()">로그아웃</button>`;
    document.querySelectorAll('.card').forEach(c=>c.classList.add('admin'));
  } else {
    document.getElementById('m-err').textContent='아이디 또는 비밀번호를 확인해주세요';
  }
}
function doLogout(){
  isAdmin=false;
  document.getElementById('nav-right').innerHTML=`<button class="admin-link" onclick="openModal()">관리자</button>`;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('admin'));
}

/* ── LOAD PERSONS ── */
async function loadPersons(){
  try{
    const {data,error}=await sb.from('persons').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    persons=data||[];
  } catch(e){
    console.warn('Supabase:',e.message);
    persons=[];
  }
  renderGrid();
}

/* ── ADD PERSON ── */
async function addPerson(){
  const name=document.getElementById('i-name').value.trim();
  const photo=document.getElementById('i-photo').value.trim();
  const link=document.getElementById('i-link').value.trim();
  if(!name){document.getElementById('i-name').focus();return}
  try{
    const {data,error}=await sb.from('persons')
      .insert([{name,photo_url:photo||null,link_url:link||null,hearts:0}])
      .select().single();
    if(error) throw error;
    persons.unshift(data);
    renderGrid();
    document.getElementById('i-name').value='';
    document.getElementById('i-photo').value='';
    document.getElementById('i-link').value='';
  } catch(e){alert('등록 실패: '+e.message)}
}

/* ── DELETE ── */
async function deletePerson(id){
  if(!confirm('이 인물을 삭제하시겠습니까?')) return;
  try{
    await sb.from('comments').delete().eq('person_id',id);
    const {error}=await sb.from('persons').delete().eq('id',id);
    if(error) throw error;
    persons=persons.filter(p=>p.id!==id);
    delete commentsCache[id];
    renderGrid();
  } catch(e){alert('삭제 실패: '+e.message)}
}

/* ── HEART ── */
async function toggleHeart(id){
  const idx=persons.findIndex(p=>p.id===id);
  if(idx<0) return;
  const already=liked.has(id);
  const delta=already?-1:1;
  already?liked.delete(id):liked.add(id);
  persons[idx].hearts=Math.max(0,(persons[idx].hearts||0)+delta);
  localStorage.setItem('jm_liked',JSON.stringify([...liked]));
  const btn=document.getElementById('hb-'+id);
  const cnt=document.getElementById('hc-'+id);
  if(btn){btn.className='heart-btn'+(liked.has(id)?' on':'');btn.querySelector('.h-icon').textContent=liked.has(id)?'♥':'♡'}
  if(cnt) cnt.textContent=persons[idx].hearts;
  try{await sb.from('persons').update({hearts:persons[idx].hearts}).eq('id',id)}catch(e){}
}

/* ── COMMENTS ── */
async function loadComments(pid){
  if(commentsCache[pid]) return;
  try{
    const {data,error}=await sb.from('comments').select('*').eq('person_id',pid).order('created_at',{ascending:true});
    if(error) throw error;
    commentsCache[pid]=data||[];
  } catch(e){commentsCache[pid]=[]}
}

async function sendComment(pid){
  const textIn=document.getElementById('ct-'+pid);
  const txt=textIn.value.trim();
  if(!txt) return;
  try{
    const {data,error}=await sb.from('comments')
      .insert([{person_id:pid,author:'익명',content:txt}])
      .select().single();
    if(error) throw error;
    if(!commentsCache[pid]) commentsCache[pid]=[];
    commentsCache[pid].push(data);
    textIn.value='';
    renderCmtList(pid);
    const cb=document.getElementById('cb-'+pid);
    if(cb) cb.textContent='댓글 '+commentsCache[pid].length;
  } catch(e){alert('댓글 등록 실패: '+e.message)}
}

async function toggleCmt(pid){
  const sec=document.getElementById('cs-'+pid);
  if(!sec) return;
  const isOpen=sec.classList.contains('on');
  if(openCmt&&openCmt!==pid){
    const prev=document.getElementById('cs-'+openCmt);
    if(prev) prev.classList.remove('on');
  }
  if(isOpen){sec.classList.remove('on');openCmt=null;return}
  await loadComments(pid);
  sec.classList.add('on');
  openCmt=pid;
  renderCmtList(pid);
}

function renderCmtList(pid){
  const list=document.getElementById('cl-'+pid);
  if(!list) return;
  const cmts=commentsCache[pid]||[];
  list.innerHTML=cmts.length===0
    ?`<div class="cmt-none">첫 번째 마음을 남겨보세요</div>`
    :cmts.map(c=>`<div class="cmt-item"><span class="cmt-text">${esc(c.content)}</span></div>`).join('');
  list.scrollTop=list.scrollHeight;
}

/* ── RENDER GRID ── */
function renderGrid(){
  const grid=document.getElementById('grid');
  if(persons.length===0){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🌸</div><p>아직 등록된 인물이 없어요</p><small>위 폼에서 첫 인물을 추가해보세요</small></div>`;
    return;
  }
  grid.innerHTML=persons.map((p,i)=>{
    const lk=liked.has(p.id);
    const h=p.hearts||0;
    const cmtCount=(commentsCache[p.id]||[]).length;
    const init=p.name?p.name.slice(0,2):'?';
    const av=p.photo_url
      ?`<img class="avatar-img" src="${esc(p.photo_url)}" alt="" onerror="this.style.display='none';document.getElementById('ai-${p.id}').style.display='flex'"><div class="avatar-initial" id="ai-${p.id}" style="display:none">${init}</div>`
      :`<div class="avatar-initial">${init}</div>`;
    return `<div class="card${isAdmin?' admin':''}" style="animation-delay:${i*.04}s" id="card-${p.id}">
  <button class="del-btn" onclick="deletePerson('${p.id}')">삭제</button>
  <div class="card-body">
    <div class="avatar-wrap">${av}</div>
    <div class="card-info">
      <div class="card-name">${esc(p.name)}</div>
      ${p.link_url
        ?`<a class="card-link" href="${esc(p.link_url)}" target="_blank" rel="noopener">${esc(p.link_url)}</a>`
        :`<span style="font-size:11.5px;color:var(--taupe)">링크 없음</span>`}
    </div>
  </div>
  <div class="card-actions">
    <button class="heart-btn${lk?' on':''}" id="hb-${p.id}" onclick="toggleHeart('${p.id}')">
      <span class="h-icon">${lk?'♥':'♡'}</span>
      <span id="hc-${p.id}">${h}</span>
    </button>
    <button class="cmt-btn" id="cb-${p.id}" onclick="toggleCmt('${p.id}')">
      💬 댓글${cmtCount>0?' '+cmtCount:''}
    </button>
  </div>
  <div class="cmt-section" id="cs-${p.id}">
    <div class="cmt-list" id="cl-${p.id}"></div>
    <div class="cmt-row">
      <input class="cmt-in" id="ct-${p.id}" placeholder="댓글을 남겨보세요…" onkeydown="if(event.key==='Enter')sendComment('${p.id}')"/>
      <button class="cmt-send" onclick="sendComment('${p.id}')">전송</button>
    </div>
  </div>
</div>`;
  }).join('');
}

/* ── RENDER RANKING ── */
function renderRank(){
  const sorted=[...persons].sort((a,b)=>(b.hearts||0)-(a.hearts||0));
  const max=sorted[0]?sorted[0].hearts||1:1;
  const list=document.getElementById('rank-list');
  if(sorted.length===0){list.innerHTML=`<div class="loading-msg">아직 데이터가 없어요</div>`;return}
  list.innerHTML=sorted.map((p,i)=>{
    const pct=max>0?Math.round((p.hearts||0)/max*100):0;
    const init=p.name?p.name.slice(0,2):'?';
    const av=p.photo_url
      ?`<img class="rank-av" src="${esc(p.photo_url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="rank-av-in" style="display:none">${init}</div>`
      :`<div class="rank-av-in">${init}</div>`;
    return `<div class="rank-item" style="animation-delay:${i*.05}s">
  <div class="rank-no">${i+1}</div>
  ${av}
  <div class="rank-info">
    <div class="rank-name">${esc(p.name)}</div>
    <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="rank-hearts">♥ ${p.hearts||0}</div>
</div>`;
  }).join('');
}

/* ── UTIL ── */
function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── INIT ── */
loadPersons();
</script>
</body>
</html>
